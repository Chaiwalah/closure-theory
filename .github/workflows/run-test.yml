name: Closure Theory Test Suite

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  closure-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run Closure Theory tests
        run: python closure_test.py
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: closure-results
          path: results/
      
      - name: Commit results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ || true
          git commit -m "Add test results [automated]" || echo "No changes to commit"
          git push || echo "Push failed"
